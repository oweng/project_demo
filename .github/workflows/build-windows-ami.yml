name: Build Windows EKS Node AMI

# Runs daily to pick up the latest EKS Windows Optimized base AMI from AWS
# (which rotates on AWS's patching cycle) and any changes to the Dockerfile or
# Packer scripts. Manual dispatch allows a forced rebuild without waiting for
# the schedule — useful after a CVE patch or config change.
on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily — after AWS typically releases new base AMIs
  push:
    paths:
      - "docker/windows-dotnet48/**"
      - "packer/**"
      - ".github/workflows/build-windows-ami.yml"
  workflow_dispatch:
    inputs:
      eks_version:
        description: "EKS version to build against (overrides repo variable)"
        required: false
        type: string

concurrency:
  group: build-windows-ami
  cancel-in-progress: false # Never cancel a running AMI build mid-flight

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  EKS_VERSION: ${{ inputs.eks_version || vars.EKS_VERSION }}
  IMAGE_REPO: windows-dotnet48

jobs:
  # ─── Job 1: Build and push Windows container base image ────────────────────
  # Runs on a Windows runner because Windows container images must be built on
  # a Windows host — you cannot cross-compile Windows container images from Linux.
  build-container-image:
    name: Build Windows container image
    runs-on: windows-2022

    permissions:
      id-token: write  # Required for OIDC auth to AWS
      contents: read

    outputs:
      image_tag: ${{ github.sha }}
      ecr_image: ${{ steps.push.outputs.ecr_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # Session duration covers a slow Windows image push (~20-30 min for 8GB+)
          role-duration-seconds: 3600

      # Switch to Windows containers mode before ECR login. Docker restarts during
      # the switch — logging in first would lose the credentials.
      - name: Switch Docker to Windows containers mode
        shell: powershell
        run: |
          $dockerCli = "$Env:ProgramFiles\Docker\Docker\DockerCli.exe"
          if (Test-Path $dockerCli) {
            & $dockerCli -SwitchWindowsEngine
            Start-Sleep -Seconds 10  # Give Docker time to restart in Windows mode
          }
          docker version

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        shell: powershell
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build `
            --file docker/windows-dotnet48/Dockerfile `
            --tag "$env:ECR_REGISTRY/$env:IMAGE_REPO:$env:IMAGE_TAG" `
            --tag "$env:ECR_REGISTRY/$env:IMAGE_REPO:latest" `
            --build-arg DD_TRACER_VERSION=2.55.0 `
            --no-cache `
            .

      # Push SHA tag first — this is the immutable reference.
      # Deployments should pin to the SHA tag; `latest` is a convenience for operators.
      - name: Push image
        id: push
        shell: powershell
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # SHA tag — effectively immutable (no two builds share a SHA)
          docker push "$env:ECR_REGISTRY/$env:IMAGE_REPO:$env:IMAGE_TAG"

          # latest — mutable, always points to the most recent successful build
          docker push "$env:ECR_REGISTRY/$env:IMAGE_REPO:latest"

          $digest = docker inspect --format='{{index .RepoDigests 0}}' `
            "$env:ECR_REGISTRY/$env:IMAGE_REPO:$env:IMAGE_TAG"

          echo "ecr_image=$env:ECR_REGISTRY/$env:IMAGE_REPO:$env:IMAGE_TAG" >> $env:GITHUB_OUTPUT
          echo "digest=$digest" >> $env:GITHUB_OUTPUT
          Write-Output "Pushed: $env:ECR_REGISTRY/$env:IMAGE_REPO:$env:IMAGE_TAG"
          Write-Output "Digest: $digest"

  # ─── Job 2: Build Packer AMI ───────────────────────────────────────────────
  # Depends on job 1 — Packer pre-pulls the ECR image into containerd during
  # the AMI build, so the image must exist in ECR before this job runs.
  # Runs on a self-hosted runner inside the VPC so it can reach the build
  # instance over WinRM — the build instance has no public IP.
  build-ami:
    name: Build Windows EKS node AMI
    runs-on: self-hosted
    needs: build-container-image

    permissions:
      id-token: write
      contents: read

    outputs:
      ami_id: ${{ steps.ami-id.outputs.ami_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # Packer builds can take 45-60 min (image pulls + AMI snapshot)
          role-duration-seconds: 7200

      - name: Setup Packer
        uses: hashicorp/setup-packer@v3.1.0
        with:
          version: "1.11.2"

      - name: Packer init
        working-directory: packer
        run: packer init windows-eks-node.pkr.hcl

      # Required for Packer's ssh_interface = "session_manager" — the plugin
      # handles port forwarding from Packer's SSH client through the SSM control plane.
      - name: Install SSM Session Manager plugin
        run: |
          curl -fsSL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" \
            -o /tmp/session-manager-plugin.deb
          sudo dpkg -i /tmp/session-manager-plugin.deb
          session-manager-plugin --version

      - name: Packer validate
        working-directory: packer
        env:
          PKR_VAR_aws_region: ${{ env.AWS_REGION }}
          PKR_VAR_eks_version: ${{ env.EKS_VERSION }}
          PKR_VAR_ecr_registry: ${{ env.ECR_REGISTRY }}
          PKR_VAR_image_tag: ${{ needs.build-container-image.outputs.image_tag }}
          PKR_VAR_subnet_id: ${{ vars.PACKER_SUBNET_ID }}
          PKR_VAR_iam_instance_profile: ${{ vars.PACKER_INSTANCE_PROFILE }}
        run: packer validate windows-eks-node.pkr.hcl

      - name: Packer build
        working-directory: packer
        env:
          PKR_VAR_aws_region: ${{ env.AWS_REGION }}
          PKR_VAR_eks_version: ${{ env.EKS_VERSION }}
          PKR_VAR_ecr_registry: ${{ env.ECR_REGISTRY }}
          PKR_VAR_image_tag: ${{ needs.build-container-image.outputs.image_tag }}
          PKR_VAR_subnet_id: ${{ vars.PACKER_SUBNET_ID }}
          PKR_VAR_iam_instance_profile: ${{ vars.PACKER_INSTANCE_PROFILE }}
          PACKER_LOG: "1"
        run: packer build -color=false windows-eks-node.pkr.hcl

      - name: Extract AMI ID from manifest
        id: ami-id
        working-directory: packer
        run: |
          AMI_ID=$(jq -r '.builds[-1].artifact_id' manifest.json | cut -d: -f2)
          echo "ami_id=${AMI_ID}" >> $GITHUB_OUTPUT
          echo "Built AMI: ${AMI_ID}"

      # Tag the AMI with the git SHA so we can trace any AMI back to the exact
      # source code and ECR image that was baked into it.
      - name: Tag AMI with git SHA and ECR image
        run: |
          aws ec2 create-tags \
            --resources ${{ steps.ami-id.outputs.ami_id }} \
            --tags \
              Key=GitSHA,Value=${{ github.sha }} \
              Key=ECRImage,Value=${{ needs.build-container-image.outputs.ecr_image }} \
              Key=EKSVersion,Value=${{ env.EKS_VERSION }} \
              Key=BuildRun,Value=${{ github.run_id }}

      # Store the AMI ID in SSM Parameter Store so Terraform can look it up
      # without hardcoding AMI IDs in variables. The node group module's launch
      # template reads from this path via a data source.
      - name: Publish AMI ID to SSM Parameter Store
        run: |
          aws ssm put-parameter \
            --name "/eks/${{ env.EKS_VERSION }}/windows-node-ami" \
            --value "${{ steps.ami-id.outputs.ami_id }}" \
            --type String \
            --overwrite \
            --description "Latest custom Windows EKS node AMI for k8s ${{ env.EKS_VERSION }}. Built ${{ github.sha }}."

          # Also write the SHA-pinned version so rollbacks are possible
          aws ssm put-parameter \
            --name "/eks/${{ env.EKS_VERSION }}/windows-node-ami/${{ github.sha }}" \
            --value "${{ steps.ami-id.outputs.ami_id }}" \
            --type String \
            --overwrite \
            --description "Windows EKS node AMI pinned to git SHA ${{ github.sha }}"

      - name: Upload manifest as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: packer-manifest-${{ github.sha }}
          path: packer/manifest.json
          retention-days: 90

      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| AMI ID | \`${{ steps.ami-id.outputs.ami_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ECR Image | \`${{ needs.build-container-image.outputs.ecr_image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| EKS Version | \`${{ env.EKS_VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Git SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SSM Path | \`/eks/${{ env.EKS_VERSION }}/windows-node-ami\` |" >> $GITHUB_STEP_SUMMARY

  # ─── Job 3: Deregister old AMIs ────────────────────────────────────────────
  # Running this daily without cleanup accumulates AMIs and EBS snapshots.
  # Keep the last 7 builds and delete older ones.
  cleanup-old-amis:
    name: Deregister old AMIs
    runs-on: self-hosted
    needs: build-ami

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deregister AMIs older than 7 builds
        run: |
          AMIS=$(aws ec2 describe-images \
            --owners self \
            --filters \
              "Name=name,Values=custom-windows-eks-${{ env.EKS_VERSION }}-*" \
              "Name=tag:ManagedBy,Values=packer" \
            --query 'sort_by(Images, &CreationDate)[*].{id:ImageId,snap:BlockDeviceMappings[0].Ebs.SnapshotId,date:CreationDate}' \
            --output json)

          TOTAL=$(echo "$AMIS" | jq length)
          KEEP=7
          DELETE_COUNT=$((TOTAL - KEEP))

          if [ "$DELETE_COUNT" -le 0 ]; then
            echo "Only $TOTAL AMIs found — nothing to clean up (keeping last $KEEP)"
            exit 0
          fi

          echo "Found $TOTAL AMIs — deregistering $DELETE_COUNT oldest"

          echo "$AMIS" | jq -r --argjson n "$DELETE_COUNT" '.[:$n][] | [.id, .snap, .date] | @tsv' | \
          while IFS=$'\t' read -r ami_id snapshot_id created_date; do
            echo "Deregistering $ami_id (created $created_date)..."
            aws ec2 deregister-image --image-id "$ami_id"
            if [ -n "$snapshot_id" ]; then
              echo "  Deleting snapshot $snapshot_id..."
              aws ec2 delete-snapshot --snapshot-id "$snapshot_id"
            fi
          done
